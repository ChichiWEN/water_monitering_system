<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>智慧水利监测系统</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.5.0/dist/echarts.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', '微软雅黑', sans-serif; background: #e8f4f0; }
        .header { background: #1a5d4a; color: white; padding: 15px 25px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; }
        .header h1 { font-size: 22px; }
        .stats { display: flex; gap: 20px; }
        .stat { text-align: center; }
        .stat-value { font-size: 24px; font-weight: bold; }
        .main-layout { display: flex; height: calc(100vh - 80px); }
        .map-panel { width: 35%; padding: 15px; display: flex; flex-direction: column; gap: 15px; }
        #map { height: 300px; border-radius: 16px; z-index: 1; }
        .station-info-card { background: white; border-radius: 16px; padding: 12px 15px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        .data-panel { flex: 1; padding: 15px; overflow-y: auto; display: flex; flex-direction: column; gap: 15px; }
        .filter-card { background: white; border-radius: 16px; padding: 15px; display: flex; gap: 15px; flex-wrap: wrap; align-items: flex-end; }
        .filter-group { display: flex; flex-direction: column; gap: 5px; }
        .filter-group label { font-size: 12px; font-weight: bold; color: #2c6e5c; }
        .filter-group select, .filter-group input { padding: 8px 12px; border: 1px solid #c8dfd6; border-radius: 10px; }
        .btn { padding: 8px 18px; background: #2c7a64; color: white; border: none; border-radius: 10px; cursor: pointer; }
        .btn:hover { background: #1e5f4c; }
        .chart-card, .table-card { background: white; border-radius: 16px; padding: 15px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        .chart-title { font-size: 16px; font-weight: bold; color: #1a5d4a; margin-bottom: 12px; border-left: 3px solid #2c9b7c; padding-left: 10px; }
        .chart-container { width: 100%; height: 280px; }
        .table-wrapper { overflow-x: auto; max-height: 300px; overflow-y: auto; }
        .water-table { width: 100%; border-collapse: collapse; font-size: 12px; }
        .water-table th { background: #1a5d4a; color: white; padding: 10px; position: sticky; top: 0; }
        .water-table td { padding: 8px; border-bottom: 1px solid #e0ede8; text-align: center; }
        .water-table tr:hover { background: #e6f4ef; cursor: pointer; }
        .warning-row { background-color: #ffe0d9; }
        .footer { text-align: center; padding: 10px; color: #6b9080; font-size: 11px; background: white; border-top: 1px solid #e0ede8; }
        @media (max-width: 900px) { .main-layout { flex-direction: column; } .map-panel { width: 100%; } #map { height: 250px; } }
    </style>
</head>
<body>
    <div class="header">
        <h1>清溪河流域智慧水利监测系统</h1>
        <div class="stats">
            <div class="stat"><div class="stat-value" id="statStations">--</div><div>监测站点</div></div>
            <div class="stat"><div class="stat-value" id="statRecords">--</div><div>数据记录</div></div>
            <div class="stat"><div class="stat-value" id="statWarning">--</div><div>超警戒</div></div>
        </div>
    </div>
    <div class="main-layout">
        <div class="map-panel">
            <div id="map"></div>
            <div class="station-info-card" id="selectedStationInfo"><span>点击地图上的测站</span><span>查看实时数据</span></div>
        </div>
        <div class="data-panel">
            <div class="filter-card">
                <div class="filter-group"><label>测站</label><select id="stationSelect"><option value="all">全部测站</option></select></div>
                <div class="filter-group"><label>开始日期</label><input type="date" id="startDate"></div>
                <div class="filter-group"><label>结束日期</label><input type="date" id="endDate"></div>
                <button class="btn" onclick="refreshData()">查询</button>
                <button class="btn" onclick="resetFilter()">重置</button>
            </div>
            <div class="chart-card"><div class="chart-title">水位变化趋势图</div><div id="trendChart" class="chart-container"></div></div>
            <div class="table-card"><div class="chart-title">水位监测数据明细</div><div class="table-wrapper"><table class="water-table"><thead><tr><th>日期</th><th>测站</th><th>水位(m)</th><th>状态</th><th>备注</th></tr></thead><tbody id="tableBody"><tr><td colspan="5">加载中...</td></tr></tbody></table></div></div>
        </div>
    </div>
    <div class="footer"><p>点击地图上的测站可快速筛选 | 水位趋势图动态更新</p></div>

    <script>
        let map = null;
        let chart = null;
        let currentStationId = "all";
        
        const today = new Date();
        const thirtyDaysAgo = new Date();
        thirtyDaysAgo.setDate(today.getDate() - 30);
        document.getElementById('startDate').value = thirtyDaysAgo.toISOString().slice(0,10);
        document.getElementById('endDate').value = today.toISOString().slice(0,10);

        function initMap() {
            map = L.map('map').setView([30.45, 114.43], 10);
            L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png').addTo(map);
            loadStations();
        }

        function loadStations() {
            fetch('/api/stations')
                .then(res => res.json())
                .then(data => {
                    data.forEach(s => {
                        L.marker([s.latitude, s.longitude])
                            .addTo(map)
                            .bindPopup('<b>' + s.name + '</b><br>河流:' + s.river + '<br>警戒:' + s.warning_level + 'm<br><button onclick="selectStation(' + s.id + ')">查看数据</button>');
                    });
                    document.getElementById('statStations').textContent = data.length;
                    const select = document.getElementById('stationSelect');
                    data.forEach(s => {
                        select.innerHTML += '<option value="' + s.id + '">📍 ' + s.name + '</option>';
                    });
                });
        }

        function selectStation(id) {
            currentStationId = id;
            document.getElementById('stationSelect').value = id;
            refreshData();
        }

        function initChart() {
            chart = echarts.init(document.getElementById('trendChart'));
        }

        function renderChart(stationId) {
            fetch('/api/chart_data?station_id=' + stationId + '&days=30')
                .then(res => res.json())
                .then(data => {
                    if (!chart) {
                        chart = echarts.init(document.getElementById('trendChart'));
                    }
                    
                    if (data.type === 'single') {
                        chart.setOption({
                            tooltip: { trigger: 'axis' },
                            legend: { data: [data.station_name, '警戒水位'] },
                            xAxis: { type: 'category', data: data.dates, name: '日期' },
                            yAxis: { type: 'value', name: '水位 (m)' },
                            series: [
                                {
                                    name: data.station_name,
                                    type: 'line',
                                    data: data.levels,
                                    smooth: true,
                                    lineStyle: { width: 2.5, color: '#2c7a64' },
                                    areaStyle: { opacity: 0.1 }
                                },
                                {
                                    name: '警戒水位',
                                    type: 'line',
                                    data: Array(data.dates.length).fill(data.warning_level),
                                    lineStyle: { width: 2, color: '#d9534f', type: 'dashed' },
                                    symbol: 'none'
                                }
                            ]
                        });
                    }
                })
                .catch(err => console.error('图表加载失败:', err));
        }

        function updateChart() {
            const stationId = document.getElementById('stationSelect').value;
            if (stationId === 'all') {
                renderChart('1');
            } else {
                renderChart(stationId);
            }
        }

        function loadTableData() {
            const stationId = document.getElementById('stationSelect').value;
            const startDate = document.getElementById('startDate').value;
            const endDate = document.getElementById('endDate').value;
            
            let url = '/api/water_data?station_id=' + stationId;
            if (startDate) url += '&start_date=' + startDate;
            if (endDate) url += '&end_date=' + endDate;
            
            fetch(url)
                .then(res => res.json())
                .then(data => {
                    document.getElementById('statRecords').textContent = data.length;
                    let warningTotal = 0;
                    const tbody = document.getElementById('tableBody');
                    tbody.innerHTML = '';
                    
                    for (let i = 0; i < data.length; i++) {
                        const r = data[i];
                        const row = tbody.insertRow();
                        const isWarning = r.level > r.warning_level;
                        if (isWarning) warningTotal++;
                        row.insertCell(0).textContent = r.date;
                        row.insertCell(1).textContent = r.station_name;
                        row.insertCell(2).textContent = r.level.toFixed(2);
                        row.insertCell(3).textContent = isWarning ? '超警戒' : (r.level > r.warning_level - 0.15 ? '接近警戒' : '正常');
                        row.insertCell(4).textContent = '';
                        if (isWarning) row.classList.add('warning-row');
                    }
                    document.getElementById('statWarning').textContent = warningTotal;
                });
        }

        function refreshData() {
            loadTableData();
            updateChart();
        }

        function resetFilter() {
            document.getElementById('stationSelect').value = 'all';
            document.getElementById('startDate').value = thirtyDaysAgo.toISOString().slice(0,10);
            document.getElementById('endDate').value = today.toISOString().slice(0,10);
            refreshData();
        }

        document.getElementById('stationSelect').addEventListener('change', refreshData);
        
        initMap();
        initChart();
        setTimeout(function() {
            renderChart('1');
            loadTableData();
        }, 500);
    </script>
</body>
</html>
